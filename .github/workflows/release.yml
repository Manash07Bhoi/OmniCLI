name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Kali Linux / ParrotOS / Debian x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: omni-linux-x86_64.tar.gz
            binary: omni

          # Kali Linux / ParrotOS ARM64 (e.g. Raspberry Pi, Apple Silicon VMs)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: omni-linux-aarch64.tar.gz
            binary: omni
            cross: true

          # Termux Android (ARM64) — primary mobile target
          - os: ubuntu-latest
            target: aarch64-linux-android
            archive: omni-android-aarch64.tar.gz
            binary: omni
            cross: true

          # Termux Android (ARMv7) — older devices
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            archive: omni-android-armv7.tar.gz
            binary: omni
            cross: true

          # macOS (community support)
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: omni-macos-x86_64.tar.gz
            binary: omni

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: omni-macos-aarch64.tar.gz
            binary: omni

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            omnicli/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('omnicli/Cargo.lock') }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install system dependencies (native Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y build-essential libssl-dev pkg-config

      - name: Build (native)
        if: '!matrix.cross'
        working-directory: omnicli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: omnicli
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          BINARY="omnicli/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if command -v strip &> /dev/null; then strip "$BINARY" || true; fi

      - name: Compute BLAKE3 checksum
        id: checksum
        run: |
          BINARY="omnicli/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          # Use sha256sum as fallback (b3sum may not be installed)
          SHA=$(sha256sum "$BINARY" | cut -d' ' -f1)
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Package archive
        run: |
          BINARY="omnicli/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          mkdir -p dist
          cp "$BINARY" dist/omni
          cp omnicli/scripts/install.sh dist/ 2>/dev/null || true
          cp README.md dist/
          cd dist
          tar czf "../${{ matrix.archive }}" .

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          for dir in */; do
            for file in "$dir"*; do
              [ -f "$file" ] && sha256sum "$file" >> SHA256SUMS.txt
            done
          done
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
          body: |
            ## Install

            ### Kali Linux / ParrotOS / Debian
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/omni-linux-x86_64.tar.gz | tar xz
            sudo install -m 755 omni /usr/local/bin/omni
            ```

            ### Termux (Android)
            ```bash
            # ARM64 (most modern devices)
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/omni-android-aarch64.tar.gz | tar xz
            install -m 755 omni $PREFIX/bin/omni
            ```

            ### Build from source
            ```bash
            git clone https://github.com/${{ github.repository }}
            cd omnicli && cargo build --release
            sudo cp target/release/omni /usr/local/bin/
            ```

            ## Verify
            ```bash
            omni --version
            omni file find --path . --count
            omni convert list
            ```
