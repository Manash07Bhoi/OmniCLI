# cargo-deny configuration
# Used by the security CI workflow to check licenses and advisories.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Emit a warning (not error) for unmaintained crates; error only on
# crates with active security advisories.
unmaintained = "warning"
yanked = "deny"
notice = "warn"

[licenses]
# Acceptable SPDX identifiers for all transitive dependencies.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "OpenSSL",
  "Zlib",
  "CC0-1.0",
  "BSL-1.0",          # Boost Software License (used by some crates)
  "LicenseRef-ring",  # ring uses a custom near-MIT licence
]
# Report unlicensed crates as errors.
unlicensed = "deny"
# Copyleft and restrictive licences — hard block.
deny = [
  "GPL-2.0",
  "GPL-3.0",
  "AGPL-3.0",
  "LGPL-2.0",
  "LGPL-2.1",
  "LGPL-3.0",
]
# Allow the same crate to appear under multiple compatible licences.
copyleft = "warn"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[[licenses.exceptions]]
# ring uses a non-SPDX custom licence that is functionally MIT/ISC.
allow = ["LicenseRef-ring"]
name = "ring"

[bans]
multiple-versions = "warn"
wildcards = "allow"
# Ban known problematic crates.
deny = [
  { name = "openssl", reason = "use rustls instead; OpenSSL is a build-time pain on cross-compile targets" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
