[advisories]
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained
    "RUSTSEC-2025-0119", # number_prefix unmaintained
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "BSL-1.0",
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
  { name = "openssl", reason = "use rustls instead; OpenSSL is a build-time pain on cross-compile targets" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
