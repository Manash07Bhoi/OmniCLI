name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: omni
  REPO: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (Kali, ParrotOS, Ubuntu)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: tar.gz
          # Linux ARM64 (Termux on modern Android, Raspberry Pi, Apple M1 cross)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: tar.gz
          # Linux ARMv7 (Termux on older 32-bit Android)
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            archive_suffix: tar.gz
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_suffix: tar.gz
          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_suffix: tar.gz
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_suffix: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux musl/ARM)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          case "${{ matrix.target }}" in
            aarch64-*)
              sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
              ;;
            armv7-*)
              sudo apt-get install -y gcc-arm-linux-gnueabihf binutils-arm-linux-gnueabihf
              ;;
          esac

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: cargo build --release --bin omni --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="omni-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/omni .
          tar -czf "$ARCHIVE" omni README.md LICENSE
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ARCHIVE = "omni-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/omni.exe" .
          Compress-Archive -Path omni.exe,README.md,LICENSE -DestinationPath $ARCHIVE
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File "$ARCHIVE.sha256" -Encoding ascii
          echo "ARCHIVE=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omni-${{ matrix.target }}
          path: |
            omni-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          cat > RELEASE_NOTES.md << 'EOF'
          ## OmniCLI ${{ github.ref_name }}

          ### Installation

          **One-line installer (Linux / macOS / Termux):**
          ```bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh
          ```

          **Manual download:** Pick the binary for your platform from the assets below, verify the checksum, and place it in your `$PATH`.

          | Platform | File |
          |----------|------|
          | Linux x86_64 (Kali, ParrotOS, Ubuntu) | `omni-x86_64-unknown-linux-musl.tar.gz` |
          | Linux ARM64 (Termux modern Android) | `omni-aarch64-unknown-linux-musl.tar.gz` |
          | Linux ARMv7 (Termux 32-bit Android) | `omni-armv7-unknown-linux-musleabihf.tar.gz` |
          | macOS x86_64 | `omni-x86_64-apple-darwin.tar.gz` |
          | macOS ARM64 (Apple Silicon) | `omni-aarch64-apple-darwin.tar.gz` |
          | Windows x86_64 | `omni-x86_64-pc-windows-msvc.zip` |

          ### Verify checksum
          ```bash
          sha256sum -c omni-<platform>.tar.gz.sha256
          ```
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "OmniCLI ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
          files: dist/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
