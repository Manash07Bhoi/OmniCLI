kind = "web"
previewPath = "/"
title = "OmniCLI Dashboard"
version = "1.0.0"
id = "artifacts/omni-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25075

[services.development]
run = "pnpm --filter @workspace/omni-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omni-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/omni-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25075"
BASE_PATH = "/"
